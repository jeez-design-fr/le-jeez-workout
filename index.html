<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LE JEEZ WORKOUT</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #39FF14;
            --neon-purple: #B026FF;
            --dark-bg: #050505;
            --grid-color: rgba(57, 255, 20, 0.05);
        }

        * { box-sizing: border-box; cursor: crosshair; }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        h1, h2, h3 { font-family: 'Syncopate', sans-serif; text-transform: uppercase; margin: 0; }

        .hero {
            padding: 40px 20px 20px 20px;
            text-align: center;
            border-bottom: 5px solid var(--neon-purple);
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(176,38,255,0.2) 100%);
        }

        .glitch-title {
            font-size: clamp(2rem, 10vw, 4rem);
            color: var(--neon-green);
            text-shadow: 2px 2px 0px var(--neon-purple);
            letter-spacing: -2px;
            margin-bottom: 10px;
        }

        .date-display { color: var(--neon-purple); font-size: 0.9rem; font-weight: bold; }

        .container { width: 100%; max-width: 100%; margin: 0 auto; padding: 20px 15px; }

        /* PHASE DYNAMIQUE */
        .phase-box {
            border: 3px solid var(--neon-green);
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.8);
            position: relative;
        }

        .phase-box.stress { border-color: var(--neon-purple); }
        .phase-box.stress #phaseTitle { color: var(--neon-purple); }
        .phase-box.stress .phase-desc { color: white; border-top: 1px dashed var(--neon-purple); }

        .phase-box::before {
            content: "STATUS_ACTUEL";
            position: absolute;
            top: -10px; left: 15px;
            background: var(--neon-green);
            color: black; font-size: 10px; padding: 2px 8px; font-weight: bold;
        }
        .phase-box.stress::before { background: var(--neon-purple); }

        #phaseTitle { font-size: 2.5rem; margin-bottom: 10px; color: var(--neon-green); }
        #cycleInfo { font-size: 0.8rem; opacity: 0.7; margin-bottom: 15px; text-transform: uppercase; }
        .phase-desc { 
            font-size: 1rem; 
            padding-top: 15px; 
            border-top: 1px dashed var(--neon-green);
            color: white; 
        }

        /* CALCULATEUR HUD */
        .hud-box {
            border: 2px solid var(--neon-green);
            padding: 20px;
            background: rgba(0,0,0,0.8);
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% 95%, 92% 100%, 0 100%);
            margin-bottom: 30px;
        }

        .hud-box::before { content: "WARMUP_MODULE"; position: absolute; top: -10px; right: 15px; background: var(--neon-green); color: black; font-size: 9px; padding: 2px 8px; }

        label { font-size: 0.8rem; color: var(--neon-purple); display: block; }
        input { width: 100%; background: transparent; border: none; border-bottom: 3px solid var(--neon-purple); color: var(--neon-green); font-size: 3.5rem; font-family: 'Syncopate', sans-serif; margin: 10px 0; outline: none; border-radius: 0; }
        button { width: 100%; background: var(--neon-green); color: black; border: none; padding: 20px; font-size: 1.2rem; font-family: 'Syncopate', sans-serif; font-weight: bold; margin-top: 10px; }
        
        .table-wrapper { width: 100%; overflow-x: auto; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; text-align: left; min-width: 320px; }
        th { color: var(--neon-purple); text-transform: uppercase; font-size: 0.65rem; border-bottom: 1px solid var(--neon-purple); padding: 8px 4px; }
        td { padding: 12px 4px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; }

        /* CARBS */
        .carbs-alert { margin-top: 30px; background: var(--neon-purple); color: white; padding: 30px 15px; clip-path: polygon(8% 0, 100% 0, 100% 100%, 0 100%, 0 5%); }
        .carbs-alert h2 { font-size: 1.8rem; margin-bottom: 15px; color: black; }
        .food-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        .food-column h3 { color: var(--neon-green); font-size: 1.2rem; border-bottom: 3px solid black; padding-bottom: 5px; margin-bottom: 10px; text-shadow: 1px 1px 0px black; }
        .list-item { border-left: 2px solid var(--neon-green); padding: 8px 10px; margin-bottom: 5px; font-size: 0.85rem; background: rgba(0,0,0,0.2); text-transform: uppercase; }

    </style>
</head>
<body>

<section class="hero">
    <h1 class="glitch-title">LE JEEZ<br>WORKOUT</h1>
    <div class="date-display" id="dateDisplay">CONNEXION EN COURS...</div>
</section>

<div class="container">
    
    <div id="phaseContainer" class="phase-box">
        <h2 id="phaseTitle">CALCUL...</h2>
        <div id="cycleInfo">...</div>
        <div class="phase-desc" id="phaseDesc">...</div>
    </div>

    <div class="hud-box">
        <label>CHARGE CIBLE (KG)</label>
        <input type="number" id="targetWeight" placeholder="000" inputmode="numeric">
        <button onclick="calculateWarmup()">RUN_SEQUENCE</button>

        <div class="table-wrapper">
            <table id="warmupTable" style="display:none;">
                <thead><tr><th>PHASE</th><th>LOAD</th><th>KG</th><th>REPS</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="carbs-alert">
        <h2>CARB_RELOAD</h2>
        <div class="food-grid">
            <div class="food-column"><h3>SUCRÉ</h3><div id="listSucre"></div></div>
            <div class="food-column"><h3>SALÉ</h3><div id="listSale"></div></div>
            <div class="food-column"><h3>REPAS</h3><div id="listRepas"></div></div>
        </div>
    </div>

</div>

<script>
    // --- 1. MOTEUR TEMPOREL ET PHASES ---
    function updateHUD() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('dateDisplay').innerText = now.toLocaleDateString('fr-FR', options).toUpperCase();

        // Calcul du cycle (1 cycle = 42 jours / 6 semaines)
        const startOfYear = new Date(now.getFullYear(), 0, 1);
        const diff = now - startOfYear;
        const oneDay = 1000 * 60 * 60 * 24;
        const dayOfYear = Math.floor(diff / oneDay);
        
        const cycleLength = 42;
        const currentCycleNumber = Math.floor(dayOfYear / cycleLength) + 1;
        const dayOfCycle = (dayOfYear % cycleLength) + 1;
        const daysLeft = cycleLength - dayOfCycle;

        const phases = [
            { type: "STRESS", name: "VASCULAR", desc: "🔥 15-25 REPS // POIDS LÉGER // REPOS COURTS // FOCUS BRÛLURE & ÉCHEC" },
            { type: "TENSION", name: "OVERLOAD 1", desc: "🧱 8-12 REPS // POIDS LOURD // REPOS LONGS // FOCUS TENSION MÉCANIQUE" },
            { type: "STRESS", name: "METABOLIC", desc: "🔥 15-25 REPS // POIDS LÉGER // REPOS COURTS // FOCUS BRÛLURE & ÉCHEC" },
            { type: "TENSION", name: "OVERLOAD 2", desc: "🧱 6-10 REPS // POIDS TRES LOURD // REPOS LONGS // FOCUS FORCE" },
            { type: "STRESS", name: "SHOCK", desc: "🔥 15-25 REPS // POIDS LÉGER // REPOS COURTS // FOCUS BRÛLURE & ÉCHEC" },
            { type: "TENSION", name: "CONSOLIDATION", desc: "🧱 10-12 REPS // POIDS LOURD // REPOS LONGS // FOCUS TENSION MÉCANIQUE" },
            { type: "STRESS", name: "DELOAD", desc: "🔥 15-25 REPS // POIDS LÉGER // REPOS COURTS // FOCUS BRÛLURE & ÉCHEC" },
            { type: "STRESS", name: "FINAL PUMP", desc: "🔥 20-30 REPS // POIDS LÉGER // REPOS COURTS // VOLUME MAXIMAL" }
        ];

        // S'assurer de ne pas dépasser le tableau
        const currentPhase = phases[(currentCycleNumber - 1) % phases.length];

        const container = document.getElementById('phaseContainer');
        const title = document.getElementById('phaseTitle');
        const info = document.getElementById('cycleInfo');
        const desc = document.getElementById('phaseDesc');

        title.innerText = `PHASE: ${currentPhase.type}`;
        info.innerText = `CYCLE ${currentCycleNumber} [${currentPhase.name}] // CHANGEMENT DANS ${daysLeft} JOURS`;
        desc.innerText = currentPhase.desc;

        if(currentPhase.type === "STRESS") {
            container.classList.add('stress');
        } else {
            container.classList.remove('stress');
        }
    }

    // --- 2. CALCULATEUR D'ÉCHAUFFEMENT ---
    function calculateWarmup() {
        const weight = parseFloat(document.getElementById('targetWeight').value);
        if (!weight) return;
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        const phases = [
            { n: 'VASCULAR', p: '20%', w: Math.round(weight*0.2), r: '15' },
            { n: 'NEURAL', p: '50%', w: Math.round(weight*0.5), r: '8' },
            { n: 'HEAVY', p: '70%', w: Math.round(weight*0.7), r: '4' },
            { n: 'PEAK', p: '85%', w: Math.round(weight*0.85), r: '1' }
        ];
        phases.forEach(ph => { tbody.innerHTML += `<tr><td>${ph.n}</td><td>${ph.p}</td><td style="color:var(--neon-green)">${ph.w}</td><td>${ph.r}</td></tr>`; });
        document.getElementById('warmupTable').style.display = 'table';
    }

    // --- 3. NUTRITION LISTS ---
    const dSucre = ["BOL AVOINE BANANE", "MUESLI FRUITS", "PUDDING CHIA", "BANANE MIEL NOIX"];
    const dSale = ["WRAPS POULET", "SANDWICH DINDE", "OMELETTE", "BAGEL AVOCAT"];
    const dRepas = ["RIZ POULET CURRY", "PATES BOLOGNAISE", "PATATE DOUCE FOUR", "PATES PESTO"];
    function popList(id, arr) { arr.forEach((item, i) => { document.getElementById(id).innerHTML += `<div class="list-item">${item}</div>`; }); }
    
    // INITIALISATION
    updateHUD();
    popList('listSucre', dSucre); popList('listSale', dSale); popList('listRepas', dRepas);
</script>
</body>
</html>
